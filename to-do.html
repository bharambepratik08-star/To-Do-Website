<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-Web</title>
    <link rel="stylesheet" href="to-do.css">
</head>
<body>
    <aside>
        <button class="aside_add_task" id="aside_add_task">➕ Add Task</button>
        <button class="aside_dashboard_task aside_Btn" id="aside_dashboard_task">Dashboard</button>
        <button class="aside_today_task aside_Btn" id="aside_today_task">Today</button>
        <button class="aside_tmr_task aside_Btn" id="aside_tmr_task">Tomorrow</button>
        <button class="aside_upcomming_task aside_Btn" id="aside_upcomming_task">Upcoming</button>
        <button class="aside_completed_task aside_Btn" id="aside_completed_task">Completed</button>
        <button class="aside_all_task aside_Btn" id="aside_all_task">All Task</button>
    </aside>
    <main>
        <div class="dashboard" id="dashboard">
            <div class="task">
                
            </div>
        </div>
        <div class="input_back" id="input_back">
            <div class="input_task" id="input_task">
                <div class="task_msg">
                    <p class="end_start_text task_d">📝 Task Title</p>
                    <input type="text" id="task_input" class="task_input" placeholder="Enter your task here...">
                </div>
                <div class="description">
                    <p class="end_start_text task_d">📝 Description</p>
                    <textarea id="task_description" placeholder="Description..."></textarea>
                </div>
                <div class="date_time_from date_time_box">
                    <p class="end_start_text">📅 Start</p>
                    <div class="from_to">
                        <div class="date_inp">
                            <select class="task_date_from task_date_time_in">
                                <option value="null">---</option>
                                <option value="today">Today</option>
                                <option value="tomorrow">Tomorrow</option>
                                <option value="select_date">Select Date</option>
                            </select>
                            <input type="date" class="date_from task_date_time_in">
                        </div>
                    </div>
                    <div class="due_till">
                        <div class="date_inp">
                            <input type="time" class="task_time_from task_time task_date_time_in">
                        </div>
                    </div>
                </div>
                <div class="date_time_to date_time_box">
                    <p class="end_start_text">📅 End</p>
                    <div class="from_to">
                        <div class="date_inp">
                            <select class="task_date_to task_date_time_in">
                                <option value="null">---</option>
                                <option value="today">Today</option>
                                <option value="tomorrow">Tomorrow</option>
                                <option value="select_date">Select Date</option>
                            </select>
                            <input type="date" class="date_to task_date_time_in">
                        </div>
                    </div>
                    <div class="due_to">
                        <div class="date_inp">
                            <input type="time" class="task_time_to task_time task_date_time_in">
                        </div>
                    </div>
                </div>
                <div class="priority pri_cat">
                    <p class="priority_text pri_cat_text">⭐ Priority:</p>
                    <button class="task_priority" id="low">🟢 Low</button>
                    <button class="task_priority" id="medium">🟡 Medium </button>   
                    <button class="task_priority" id="high">🔴 High</button>
                </div>
                <div class="cato pri_cat" id="cato">
                    <p class="priority_text pri_cat_text"> 🏷 Categories :</p>
                    <select class="cato_sel task_date_time_in" id="own">
                            <option value="null" id="null">---</option>
                            <option value="gym" id="gym">Gym</option>
                            <option value="school" id="school">School</option>
                            <option value="wrk" id="wrk">Work</option>
                            <option value="shopping" id="shopping">Shopping</option>
                            <option value="personal" id="presonal">Personal</option>
                            <option value="game" id="game">Game</option>
                            <option value="meeting" id="meeting">Meeting</option>
                            <option value="none" id="none">None</option>
                            <option value="your_own" id="your_own">Enter Your Own</option>
                    </select>
                    <input type="text" class=" own task_input" id="own" placeholder="Enter your category">
                </div>
                <div class="cancel_add">
                    <button class="cancel_btn" id="cancel_btn">Cancel</button>
                    <button class="add_btn" id="add_btn">Add Task</button>
                </div>
            </div>
        </div>
    </main>
    <script src="to-do.js"></script>
</body>
</html>
